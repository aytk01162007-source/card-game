<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ボイシング・カードバトル - 完全版</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
    
    /* ステータスバー */
    #status-bar { position: fixed; top: 10px; left: 10px; z-index: 100; display: flex; gap: 8px; }
    .status-item { background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 5px; border: 1px solid gold; color: gold; font-weight: bold; font-size: 13px; min-width: 65px; }
    
    #menu { position: fixed; top: 10px; right: 10px; z-index: 100; }
    button { margin: 4px; padding: 10px 15px; cursor: pointer; background: #333; color: white; border: 1px solid #777; border-radius: 4px; font-weight: bold; }
    button:hover { background: #555; }
    
    .screen { display: none; padding-top: 70px; padding-bottom: 50px; min-height: 100vh; box-sizing: border-box; }
    .active { display: block; }
    
    .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 150px; padding: 10px; background: rgba(255,255,255,0.03); margin: 10px; border-radius: 10px; }
    
    /* カードデザイン */
    .card { width: 95px; height: 140px; border: 2px solid #ccc; border-radius: 8px; background: #222; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 6px; box-sizing: border-box; position: relative; user-select: none; }
    .card .title { font-size: 8px; color: #aaa; height: 28px; overflow: hidden; line-height: 1.2; }
    .card .name { font-weight: bold; font-size: 11px; margin: 2px 0; }
    .card .stars { color: gold; font-size: 12px; }
    .star1 { border-color: #eee; }
    .star2 { border-color: #4488ff; box-shadow: 0 0 5px #4488ff; }
    .star3 { border-color: #ffcc00; box-shadow: 0 0 10px gold; background: linear-gradient(135deg, #222, #3a3a00); }

    /* ミニゲーム用 */
    #mg-area { width: 300px; height: 40px; background: #333; margin: 20px auto; position: relative; border-radius: 20px; border: 2px solid #fff; overflow: hidden; }
    #mg-bar { width: 15px; height: 100%; background: #ff4444; position: absolute; left: 0; box-shadow: 0 0 10px red; }
    #mg-target { width: 40px; height: 100%; background: rgba(255,215,0,0.5); position: absolute; left: 130px; border-left: 2px solid gold; border-right: 2px solid gold; }

    .shop-section { background: rgba(255,255,255,0.05); margin: 15px; padding: 15px; border-radius: 10px; border: 1px solid #444; }
    .treasure { font-size: 50px; cursor: pointer; transition: 0.2s; display: inline-block; margin: 10px; }
    .treasure:hover { transform: scale(1.1); }
    
    #actionPanel { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); padding: 20px; border-radius: 15px; border: 3px solid gold; z-index: 200; box-shadow: 0 0 40px #000; }
  </style>
</head>
<body>

<div id="status-bar">
  <div class="status-item">💰 <span id="val-money">900</span></div>
  <div class="status-item">🎶 <span id="val-notes">50</span></div>
  <div class="status-item">🔑 <span id="val-keys">0</span></div>
</div>

<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">デッキ</button>
  <button onclick="showScreen('battleSelect')">対戦</button>
  <button onclick="showScreen('shop')">ショップ</button>
</div>

<!-- ガチャ画面 -->
<div id="draw" class="screen active">
  <h2>通常ガチャ</h2>
  <button onclick="drawCard()">1回（100コイン）</button>
  <button onclick="draw10()">10連（900コイン）</button>
  <div id="drawResult" class="card-container"></div>
</div>

<!-- デッキ編成画面 -->
<div id="stock" class="screen">
  <p style="font-size:0.7em;">※長押し(右クリ)で強化画面</p>
  <h2>デッキ (<span id="deckCount">0</span>/20)</h2>
  <div id="deckArea" class="card-container"></div>
  <h2>所持カード一覧</h2>
  <div id="stockList" class="card-container"></div>
</div>

<!-- 強化画面 -->
<div id="upgrade" class="screen">
  <h2>カード強化</h2>
  <div id="upgradeCard" style="display: flex; justify-content: center; margin-bottom: 15px;"></div>
  <div id="upgradeCost" style="font-size: 1em; color: gold; margin-bottom: 15px; font-weight: bold;"></div>
  <button onclick="levelUp()" style="background: #262; padding: 15px 40px;">レベルアップ！</button>
  <button onclick="showScreen('stock')">戻る</button>
</div>

<!-- 対戦選択画面 -->
<div id="battleSelect" class="screen">
  <h2>対戦相手を選択</h2>
  <button onclick="startBattle('easy')">初級 (鍵率15%)</button>
  <button onclick="startBattle('normal')">中級 (鍵率30%)</button>
  <button onclick="startBattle('hard')">上級 (鍵率50%)</button>
  <p style="color: #ff4444; font-size: 0.8em;">【ルール】場(バトル・待機)が全滅した時点で負けとなります</p>
</div>

<!-- 対戦中画面 -->
<div id="battle" class="screen">
  <div style="background: #000; padding: 10px; display: flex; justify-content: space-around;">
    <div style="color:#ff6666">BOTライフ: <span id="eLife">5000</span></div>
    <div style="color:#66ff66">自分ライフ: <span id="pLife">5000</span></div>
  </div>
  <div style="font-size: 0.7em; color: #aaa; margin-top: 5px;">相手バトルゾーン</div>
  <div id="enemyZone" class="card-container"></div>
  <div style="font-size: 0.7em; color: #aaa;">自分バトルゾーン (タップで攻撃)</div>
  <div id="battleZone" class="card-container"></div>
  <div style="font-size: 0.7em; color: #aaa;">待機ゾーン</div>
  <div id="benchZone" class="card-container"></div>
  <div style="font-size: 0.7em; color: #aaa;">手札</div>
  <div id="hand" class="card-container"></div>
  <button onclick="passTurn()" style="background:#822; width:90%; padding: 15px; margin: 10px;">ターン終了</button>
</div>

<!-- ショップ＆ミニゲーム -->
<div id="shop" class="screen">
  <div class="shop-section">
    <h2>🎶 音符ミニゲーム</h2>
    <p style="font-size:0.8em;">消費: 50コイン</p>
    <div id="mg-area">
      <div id="mg-target"></div>
      <div id="mg-bar"></div>
    </div>
    <button onclick="playMinigame()" id="mg-btn">スタート</button>
    <p id="mg-msg" style="color: gold;">タイミングよく止めて音符をGET！</p>
  </div>
  <div class="shop-section">
    <h2>🔑 宝箱</h2>
    <div class="treasure" onclick="openChest()">🎁</div>
    <p id="key-msg">鍵を消費して100～1000コインGET！</p>
  </div>
  <div class="shop-section">
    <h2>💎 音符ガチャ</h2>
    <p style="font-size:0.8em;">消費: 20音符</p>
    <button onclick="drawNoteGacha()" style="border-color: aqua;">音符ガチャを回す</button>
  </div>
</div>

<!-- アクションパネル -->
<div id="actionPanel">
  <div id="selectedCardName" style="margin-bottom:10px; font-weight:bold; color: gold;"></div>
  <button onclick="confirmPlay('battle')" style="background:#282;">前衛へ</button>
  <button onclick="confirmPlay('bench')" style="background:#228;">後衛へ</button><br>
  <button onclick="cancelPlay()" style="background:#444; margin-top:15px;">キャンセル</button>
</div>

<script>
// --- キャラクターマスターデータ ---
const cardMaster = {
  "りうら": [{t:"｢いれいす｣",s:1},{t:"｢恋の約束｣",s:2},{t:"｢3分ちょい！2023ver.｣",s:3},{t:"｢星降るフェアリーテイル｣",s:3}],
  "-hotoke-": [{t:"｢いれいす｣",s:1},{t:"｢恋の約束｣",s:2},{t:"｢3分ちょい！2023ver.｣",s:3},{t:"｢星降るフェアリーテイル｣",s:3}],
  "初兎": [{t:"｢いれいす｣",s:1},{t:"｢恋の約束｣",s:2},{t:"｢3分ちょい！2023ver.｣",s:3},{t:"｢星降るフェアリーテイル｣",s:3}],
  "ないこ": [{t:"｢いれいす｣",s:1},{t:"｢恋の約束｣",s:2},{t:"｢3分ちょい！2023ver.｣",s:3},{t:"｢星降るフェアリーテイル｣",s:3}],
  "If": [{t:"｢いれいす｣",s:1},{t:"｢恋の約束｣",s:2},{t:"｢3分ちょい！2023ver.｣",s:3},{t:"｢星降るフェアリーテイル｣",s:3}],
  "悠佑": [{t:"｢いれいす｣",s:1},{t:"｢恋の約束｣",s:2},{t:"｢3分ちょい！2023ver.｣",s:3},{t:"｢星降るフェアリーテイル｣",s:3}],
  "Coe.": [{t:"｢すたぽら｣",s:1},{t:"｢First Star｣",s:2},{t:"｢おぎゃりたい！えぶりでい｣",s:3},{t:"｢僕らのヒーロー大作戦！｣",s:3}],
  "Relu": [{t:"｢すたぽら｣",s:1},{t:"｢First Star｣",s:2},{t:"｢おぎゃりたい！えぶりでい｣",s:3},{t:"｢僕らのヒーロー大作戦！｣",s:3}],
  "如月ゆう": [{t:"｢すたぽら｣",s:1},{t:"｢First Star｣",s:2},{t:"｢おぎゃりたい！えぶりでい｣",s:3},{t:"｢僕らのヒーロー大作戦！｣",s:3}],
  "くに": [{t:"｢すたぽら｣",s:1},{t:"｢First Star｣",s:2},{t:"｢おぎゃりたい！えぶりでい｣",s:3},{t:"｢僕らのヒーロー大作戦！｣",s:3}],
  "こったろ": [{t:"｢すたぽら｣",s:1},{t:"｢First Star｣",s:2},{t:"｢おぎゃりたい！えぶりでい｣",s:3},{t:"｢僕らのヒーロー大作戦！｣",s:3}],
  "暇72": [{t:"｢シクフォニ｣",s:1},{t:"｢J0KER×JOK3R｣",s:2},{t:"｢廻｣",s:3},{t:"｢Medi信｣",s:3}],
  "雨乃こさめ": [{t:"｢シクフォニ｣",s:1},{t:"｢J0KER×JOK3R｣",s:2},{t:"｢廻｣",s:3},{t:"｢Medi信｣",s:3}],
  "いるま": [{t:"｢シクフォニ｣",s:1},{t:"｢J0KER×JOK3R｣",s:2},{t:"｢廻｣",s:3},{t:"｢Medi信｣",s:3}],
  "LAN": [{t:"｢シクフォニ｣",s:1},{t:"｢J0KER×JOK3R｣",s:2},{t:"｢廻｣",s:3},{t:"｢Medi信｣",s:3}],
  "すち": [{t:"｢シクフォニ｣",s:1},{t:"｢J0KER×JOK3R｣",s:2},{t:"｢廻｣",s:3},{t:"｢Medi信｣",s:3}],
  "みこと": [{t:"｢シクフォニ｣",s:1},{t:"｢J0KER×JOK3R｣",s:2},{t:"｢廻｣",s:3},{t:"｢Medi信｣",s:3}],
  "ARKHE": [{t:"｢クロノヴァ｣",s:1},{t:"｢Antitype｣",s:2},{t:"｢Order×Chaos｣",s:3},{t:"｢アラブリマスカ｣",s:3}],
  "かなめ": [{t:"｢クロノヴァ｣",s:1},{t:"｢Antitype｣",s:2},{t:"｢Order×Chaos｣",s:3},{t:"｢アラブリマスカ｣",s:3}],
  "うるみや": [{t:"｢クロノヴァ｣",s:1},{t:"｢Antitype｣",s:2},{t:"｢Order×Chaos｣",s:3},{t:"｢アラブリマスカ｣",s:3}],
  "しの": [{t:"｢クロノヴァ｣",s:1},{t:"｢Antitype｣",s:2},{t:"｢Order×Chaos｣",s:3},{t:"｢アラブリマスカ｣",s:3}],
  "しゃるろ": [{t:"｢クロノヴァ｣",s:1},{t:"｢Antitype｣",s:2},{t:"｢Order×Chaos｣",s:3},{t:"｢アラブリマスカ｣",s:3}],
  "甘夢れむ": [{t:"｢クロノヴァ｣",s:1},{t:"｢Antitype｣",s:2},{t:"｢Order×Chaos｣",s:3},{t:"｢アラブリマスカ｣",s:3}],
  "ユエル": [{t:"｢ブラフラ｣",s:1},{t:"｢傷明｣",s:2},{t:"｢アラサガシ｣",s:3},{t:"｢軌道線｣",s:3}],
  "初噛みつき": [{t:"｢ブラフラ｣",s:1},{t:"｢傷明｣",s:2},{t:"｢アラサガシ｣",s:3},{t:"｢軌道線｣",s:3}],
  "天來らいむ": [{t:"｢ブラフラ｣",s:1},{t:"｢傷明｣",s:2},{t:"｢アラサガシ｣",s:3},{t:"｢軌道線｣",s:3}],
  "ひづみ": [{t:"｢ブラフラ｣",s:1},{t:"｢傷明｣",s:2},{t:"｢アラサガシ｣",s:3},{t:"｢軌道線｣",s:3}],
  "らみ": [{t:"｢ブラフラ｣",s:1},{t:"｢傷明｣",s:2},{t:"｢アラサガシ｣",s:3},{t:"｢軌道線｣",s:3}],
  "リンドウネイロ": [{t:"｢ブラフラ｣",s:1},{t:"｢傷明｣",s:2},{t:"｢アラサガシ｣",s:3},{t:"｢軌道線｣",s:3}],
};

// --- ゲーム変数 ---
let money = 900, notes = 50, keys = 0;
let stock = [], deck = [];
let currentUpgradeCard = null, pressTimer;
let pLife, eLife, bHand, bZone, bBench, eZone, bDeck, eDeck, hasAttacked, selectedCardId, currentDiff;
let mgPos = 0, mgDir = 4, mgActive = false, mgRequestId;

window.onload = () => { updateStatus(); };

function updateStatus() {
  document.getElementById("val-money").innerText = Math.floor(money);
  document.getElementById("val-notes").innerText = Math.floor(notes);
  document.getElementById("val-keys").innerText = keys;
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if (id === 'stock') showStock();
  if (id === 'shop') mgActive = false; 
}

function createCard(minStar = 1) {
  const names = Object.keys(cardMaster);
  const name = names[Math.floor(Math.random() * names.length)];
  const variations = cardMaster[name];
  let star = (minStar === 2) ? (Math.random() < 0.2 ? 3 : 2) : (Math.random() < 0.1 ? 3 : (Math.random() < 0.4 ? 2 : 1));
  const v = variations.find(x => x.s == star) || variations[0];
  return { id: Math.random().toString(36).substr(2, 9), name: name, title: v.t, stars: v.s, level: 1, hp: v.s * 1000, maxHp: v.s * 1000 };
}

function cardHTML(c, type) {
  return `
    <div class="card star${c.stars}" 
         onclick="cardClick('${c.id}', '${type}')" 
         onmousedown="startPress('${c.id}')" onmouseup="endPress()" onmouseleave="endPress()"
         ontouchstart="startPress('${c.id}')" ontouchend="endPress()"
         oncontextmenu="event.preventDefault(); startPress('${c.id}', true);">
      <div class="title">${c.title}</div>
      <div class="name">${c.name}</div>
      <div style="color:#ff6666; font-weight:bold;">HP:${Math.floor(c.hp)}</div>
      <div class="stars">${"★".repeat(c.stars)}</div>
      <div style="font-size:9px;">Lv.${c.level}</div>
    </div>`;
}

function cardClick(id, type) {
  if (type === 'stock') {
    let idx = stock.findIndex(c => c.id == id);
    if (idx != -1) { if (deck.length < 20) deck.push(stock.splice(idx, 1)[0]); else alert("20枚まで"); showStock(); }
  } else if (type === 'deck') {
    let idx = deck.findIndex(c => c.id == id);
    if (idx != -1) { stock.push(deck.splice(idx, 1)[0]); showStock(); }
  } else if (type === 'hand') {
    selectedCardId = id;
    let c = bHand.find(x => x.id == id);
    document.getElementById("selectedCardName").innerText = c.title + c.name;
    document.getElementById("actionPanel").style.display = "block";
  } else if (type === 'battle') {
    attack(id);
  }
}

function startPress(id, immediate = false) {
  const openUp = () => {
    let c = stock.find(x => x.id == id) || deck.find(x => x.id == id) || bHand?.find(x => x.id == id);
    if (c) { currentUpgradeCard = c; showScreen('upgrade'); updateUpgradeInfo(); }
  };
  if (immediate) return openUp();
  pressTimer = setTimeout(openUp, 600);
}
function endPress() { clearTimeout(pressTimer); }

function updateUpgradeInfo() {
  document.getElementById("upgradeCard").innerHTML = cardHTML(currentUpgradeCard, 'none');
  let cC = currentUpgradeCard.level * 25 + 50, cN = Math.floor(currentUpgradeCard.level / 2) + 5;
  document.getElementById("upgradeCost").innerText = `必要素材: 💰${cC} / 🎶${cN}`;
}

function levelUp() {
  let cC = currentUpgradeCard.level * 25 + 50, cN = Math.floor(currentUpgradeCard.level / 2) + 5;
  if (money < cC || notes < cN) return alert("素材不足");
  money -= cC; notes -= cN; currentUpgradeCard.level++;
  currentUpgradeCard.maxHp += 400; currentUpgradeCard.hp = currentUpgradeCard.maxHp;
  updateStatus(); updateUpgradeInfo();
}

function drawCard() {
  if (money < 100) return alert("コイン不足");
  money -= 100; updateStatus();
  let c = createCard(); stock.push(c);
  document.getElementById("drawResult").innerHTML = cardHTML(c, 'none');
}
function draw10() {
  if (money < 900) return alert("コイン不足");
  money -= 900; updateStatus();
  let h = ""; for (let i = 0; i < 10; i++) { let c = createCard(); stock.push(c); h += cardHTML(c, 'none'); }
  document.getElementById("drawResult").innerHTML = h;
}

function animateBar() {
  if (!mgActive) return;
  mgPos += mgDir;
  if (mgPos >= 285 || mgPos <= 0) mgDir *= -1;
  document.getElementById("mg-bar").style.left = mgPos + "px";
  mgRequestId = requestAnimationFrame(animateBar);
}

function playMinigame() {
  const btn = document.getElementById("mg-btn");
  if (!mgActive) {
    if (money < 50) return alert("50コイン必要");
    money -= 50; updateStatus();
    mgActive = true; btn.innerText = "ストップ！"; animateBar();
  } else {
    mgActive = false; cancelAnimationFrame(mgRequestId);
    let dist = Math.abs(mgPos - 142.5);
    let reward = (dist < 15) ? 35 : (dist < 40) ? 15 : 5;
    notes += reward; updateStatus();
    btn.innerText = "もう一度（50コイン）";
    alert(dist < 15 ? "Perfect!!" : dist < 40 ? "Good" : "Nice");
  }
}

function openChest() {
  if (keys <= 0) return alert("鍵なし");
  keys--; let win = Math.floor(Math.random() * 901) + 100;
  money += win; updateStatus(); alert(win + "コイン獲得！");
}

function drawNoteGacha() {
  if (notes < 20) return alert("音符不足");
  notes -= 20; updateStatus();
  if (Math.random() < 0.7) { let win = Math.floor(Math.random() * 701) + 300; money += win; alert(win + "コイン獲得"); }
  else { let c = createCard(2); stock.push(c); alert("レア確定！ " + c.name); }
  updateStatus();
}

function startBattle(d) {
  if (deck.length < 20) return alert("デッキ20枚必要");
  currentDiff = d; pLife = 5000; eLife = 5000;
  bZone = []; bBench = []; eZone = []; bHand = []; hasAttacked = false;
  bDeck = JSON.parse(JSON.stringify(deck)).sort(() => Math.random() - 0.5);
  eDeck = [];
  let eLv = d == 'easy' ? 1 : (d == 'normal' ? 15 : 40);
  for (let i = 0; i < 30; i++) {
    let ec = createCard(d == 'hard' ? 2 : 1);
    ec.level = eLv + Math.floor(Math.random() * 5);
    ec.hp = ec.maxHp = ec.level * 500 + 500;
    eDeck.push(ec);
  }
  for (let i = 0; i < 5; i++) bHand.push(bDeck.pop());
  refillEnemy(); showScreen('battle'); updateBattleUI();
}

function refillEnemy() {
  let maxE = currentDiff == 'easy' ? 1 : 2;
  while (eZone.length < maxE && eDeck.length > 0) { eZone.push(eDeck.pop()); }
}

function updateBattleUI() {
  document.getElementById("eLife").innerText = eLife;
  document.getElementById("pLife").innerText = pLife;
  document.getElementById("hand").innerHTML = bHand.map(c => cardHTML(c, 'hand')).join("");
  document.getElementById("battleZone").innerHTML = bZone.map(c => cardHTML(c, 'battle')).join("");
  document.getElementById("benchZone").innerHTML = bBench.map(c => cardHTML(c, 'none')).join("");
  document.getElementById("enemyZone").innerHTML = eZone.map(c => cardHTML(c, 'none')).join("");
  if (pLife > 0 && eLife > 0 && bZone.length === 0 && bBench.length === 0 && bHand.length === 0 && bDeck.length === 0) {
    finishBattle("LOSE", "カード全滅");
  }
}

function confirmPlay(t) {
  let idx = bHand.findIndex(x => x.id == selectedCardId);
  let c = bHand.splice(idx, 1)[0];
  if (t == 'battle' && bZone.length < 2) bZone.push(c);
  else if (t == 'bench' && bBench.length < 3) bBench.push(c);
  else bHand.push(c);
  document.getElementById("actionPanel").style.display = "none";
  updateBattleUI();
}
function cancelPlay() { document.getElementById("actionPanel").style.display = "none"; }

function attack(id) {
  if (hasAttacked) return alert("攻撃は1ターン1回");
  let atkCard = bZone.find(x => x.id == id);
  let dmg = atkCard.level * 200 + atkCard.stars * 200;
  if (eZone.length > 0) {
    eZone[0].hp -= dmg;
    if (eZone[0].hp <= 0) { alert("撃破！"); eZone.shift(); refillEnemy(); }
  } else { eLife -= dmg; }
  hasAttacked = true; updateBattleUI();
  if (eLife <= 0 || (eZone.length === 0 && eDeck.length === 0)) finishBattle("WIN", "勝利");
}

function passTurn() {
  refillEnemy();
  if (eZone.length > 0) {
    let dmg = eZone[0].level * 180 + eZone[0].stars * 100;
    if (bZone.length > 0) {
      bZone[0].hp -= dmg;
      if (bZone[0].hp <= 0) { alert("倒された"); bZone.shift(); }
    } else { pLife -= dmg; }
  }
  if (pLife <= 0) return finishBattle("LOSE", "ライフ消滅");
  if (bZone.length === 0 && bBench.length === 0 && bDeck.length === 0 && bHand.length === 0) return finishBattle("LOSE", "全滅");
  if (bDeck.length > 0) bHand.push(bDeck.pop());
  while (bZone.length < 2 && bBench.length > 0) bZone.push(bBench.shift());
  hasAttacked = false; updateBattleUI();
}

function finishBattle(res, msg) {
  if (res === "WIN") {
    let rew = currentDiff == 'easy' ? 150 : (currentDiff == 'normal' ? 350 : 700);
    money += rew; let prob = currentDiff == 'easy' ? 0.15 : (currentDiff == 'normal' ? 0.3 : 0.5);
    if (Math.random() < prob) { keys++; alert("鍵GET"); }
    alert("勝利 " + rew + "枚");
  } else { alert("負け " + msg); }
  updateStatus(); showScreen('battleSelect');
}

function showStock() {
  document.getElementById("deckCount").innerText = deck.length;
  document.getElementById("deckArea").innerHTML = deck.map(c => cardHTML(c, 'deck')).join("");
  document.getElementById("stockList").innerHTML = stock.map(c => cardHTML(c, 'stock')).join("");
}
</script>
