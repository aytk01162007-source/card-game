<button onclick="drawCard()">カードを引く</button>

<h2>自分</h2>
<div id="player"></div>

<h2>BOT</h2>
<div id="bot"></div>

<script>
let player = [];
let bot = [];
let turn = "player";

function drawCard() {
  if (turn !== "player") return;

  let num = Math.floor(Math.random() * 10) + 1;
  player.push(num);
  show();

  turn = "bot";
  setTimeout(botTurn, 1000);
}

function botTurn() {
  let num = Math.floor(Math.random() * 10) + 1;
  bot.push(num);
  show();

  turn = "player";
}

function show() {
  document.getElementById("player").innerHTML = player.join(", ");
  document.getElementById("bot").innerHTML = bot.join(", ");
}
</script>
