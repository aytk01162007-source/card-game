<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ボイシング・カードバトル - 全スキル連動版</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
    #status-bar { position: fixed; top: 10px; left: 10px; z-index: 100; display: flex; gap: 8px; }
    .status-item { background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 5px; border: 1px solid gold; color: gold; font-weight: bold; font-size: 13px; min-width: 65px; }
    #menu { position: fixed; top: 10px; right: 10px; z-index: 100; }
    button { margin: 4px; padding: 10px 15px; cursor: pointer; background: #333; color: white; border: 1px solid #777; border-radius: 4px; font-weight: bold; }
    button:hover { background: #555; }
    .screen { display: none; padding-top: 70px; padding-bottom: 50px; min-height: 100vh; box-sizing: border-box; }
    .active { display: block; }
    .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 120px; padding: 10px; background: rgba(255,255,255,0.03); margin: 10px; border-radius: 10px; }
    
    .card { width: 100px; height: 185px; border: 2px solid #ccc; border-radius: 8px; background: #222; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 6px; box-sizing: border-box; position: relative; transition: 0.2s; }
    .card .title { font-size: 8px; color: #aaa; height: 35px; overflow: hidden; line-height: 1.1; font-weight: bold; }
    .card .name { font-weight: bold; font-size: 11px; margin: 2px 0; border-bottom: 1px solid #444; }
    .card .stats { display: flex; justify-content: space-around; font-weight: bold; margin-top: 2px; }
    .star2 { border-color: #4488ff; box-shadow: 0 0 5px #4488ff; }
    .star3 { border-color: #ffcc00; box-shadow: 0 0 10px gold; background: linear-gradient(135deg, #222, #3a3a00); }

    .card.attacking { border-color: #ff0000; transform: translateY(-10px); box-shadow: 0 0 15px #ff0000; z-index: 10; }
    .card.targetable { border-color: #ffff00; animation: blink 1s infinite; }
    .card.silenced { opacity: 0.4; filter: grayscale(1); border-style: dotted; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    #actionPanel { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); padding: 20px; border-radius: 15px; border: 3px solid gold; z-index: 200; box-shadow: 0 0 40px #000; }
    .skill-text { font-size: 8px; color: #0f0; margin-top: 2px; line-height: 1.1; height: 45px; overflow: hidden; border-top: 1px solid #333; padding-top: 2px; text-align: left;}
  </style>
</head>
<body>

<div id="status-bar">
  <div class="status-item">💰 <span id="val-money">999999</span></div>
  <div class="status-item">🎶 <span id="val-notes">99999</span></div>
  <div class="status-item">🔑 <span id="val-keys">0</span></div>
</div>

<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">デッキ</button>
  <button onclick="showScreen('battleSelect')">対戦</button>
  <button onclick="showScreen('shop')">ショップ</button>
</div>

<div id="draw" class="screen active">
  <h2>通常ガチャ</h2>
  <button onclick="drawCard()">1回（100）</button>
  <button onclick="draw10()">10連（900）</button>
  <div id="drawResult" class="card-container"></div>
</div>

<div id="stock" class="screen">
  <h2>デッキ編成 (<span id="deckCount">0</span>/20)</h2>
  <div id="deckArea" class="card-container"></div>
  <h2>所持カード一覧（長押しで強化）</h2>
  <div id="stockList" class="card-container"></div>
</div>

<div id="upgrade" class="screen">
  <h2>カード強化</h2>
  <div id="upgradeCard" style="display: flex; justify-content: center; margin-bottom: 15px;"></div>
  <div id="upgradeCost" style="font-size: 1.1em; color: gold; font-weight: bold; margin-bottom: 15px;"></div>
  <button onclick="levelUp()" id="upBtn" style="background: #262; padding: 15px 40px;">レベルアップ！</button>
  <button onclick="showScreen('stock')">戻る</button>
</div>

<div id="battleSelect" class="screen">
  <h2>対戦相手を選択</h2>
  <button onclick="startBattle('easy')">初級</button>
  <button onclick="startBattle('normal')">中級</button>
  <button onclick="startBattle('hard')">上級</button>
</div>

<div id="battle" class="screen">
  <div id="battleUI" style="background: #000; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #444;">
    <div onclick="selectTarget('direct')" style="color:#ff6666; cursor:pointer;">BOT HP: <span id="eLife">5000</span> <span id="directMark" style="color:yellow; display:none;">●狙える</span></div>
    <div style="color:#66ff66">YOU HP: <span id="pLife">5000</span></div>
  </div>
  <div style="font-size:10px; color:#aaa;">BOT 待機</div>
  <div id="enemyBenchZone" class="card-container" style="min-height: 60px;"></div>
  <div style="font-size:10px; color:#aaa;">BOT バトル</div>
  <div id="enemyZone" class="card-container"></div>
  <hr>
  <div style="font-size:10px; color:#aaa;">自分 バトル</div>
  <div id="battleZone" class="card-container"></div>
  <div style="font-size:10px; color:#aaa;">自分 待機</div>
  <div id="benchZone" class="card-container"></div>
  <div style="font-size:10px; color:#aaa;">手札</div>
  <div id="hand" class="card-container"></div>
  <button onclick="passTurn()" style="background:#822; width:90%; padding: 15px; margin: 10px;">ターン終了</button>
</div>

<div id="shop" class="screen">
  <button onclick="openChest()" style="font-size:24px; margin:10px;">🎁 宝箱を開ける</button>
</div>

<div id="actionPanel">
  <div id="selName" style="margin-bottom:10px; font-weight:bold; color: gold;"></div>
  <button onclick="confirmPlay('battle')" style="background:#282;">前衛へ</button>
  <button onclick="confirmPlay('bench')" style="background:#228;">待機ゾーンへ</button><br>
  <button onclick="cancelPlay()" style="background:#444; margin-top:15px;">キャンセル</button>
</div>

<script>
// --- カードマスター ---
const cardMaster = {
  "りうら": [
    {t:"｢いれいす｣", s:1, hp:1200, atk:400, sid:"none", desc:""},
    {t:"｢恋の約束｣", s:2, hp:2200, atk:600, sid:"riura_s2", desc:"相手ドロー毎にダメージ\nLv50:50 / MAX:100"},
    {t:"｢推しが見つかる3分ちょい！2023ver.｣", s:3, hp:3600, atk:900, sid:"riura_s3", desc:"味方に同タイトルがいれば攻撃UP\nLv50:+500 / MAX:+1000"},
    {t:"｢星降るフェアリーテイル｣", s:3, hp:4000, atk:850, sid:"riura_s3_2", desc: "出た時に敵HP減少\nバトル時:MAX-800 / 待機時:MAX-500"}
  ],
  "-hotoke-": [
    {t:"｢いれいす｣", s:1, hp:1100, atk:380, sid:"none", desc:""},
    {t:"｢恋の約束｣", s:2, hp:2000, atk:550, sid:"hotoke_s2", desc:"出した時に追加ドロー\nLv50:2枚 / MAX:3枚"},
    {t:"｢推しが見つかる3分ちょい！2023ver.｣", s:3, hp:3400, atk:800, sid:"hotoke_s3", desc:"毎自ターン開始時ライフ回復\nLv50:100 / MAX:200"},
    {t:"｢星降るフェアリーテイル｣", s:3, hp:3800, atk:750, sid:"hotoke_s3_2", desc: "待機時、前衛2人が同名なら\nHPを最大1500強化"}
  ],
  "初兎": [
    {t:"｢いれいす｣", s:1, hp:1200, atk:450, sid:"none", desc:""},
    {t:"｢恋の約束｣", s:2, hp:2200, atk:650, sid:"shou_s2", desc: "待機に出たターンのみ攻撃UP\nLv50:500 / MAX:700"},
    {t:"｢推しが見つかる3分ちょい！2023ver.｣", s:3, hp:3500, atk:950, sid:"shou_s3", desc:"ドロー数増加\nLv100ならどこでも確定"},
    {t:"｢星降るフェアリーテイル｣", s:3, hp:3900, atk:900, sid:"shou_s3_2", desc: "ダメージを受けた時相手に反射\nMAX:1000ダメージ"}
  ],
  "ないこ": [
    {t:"｢いれいす｣", s:1, hp:1200, atk:400, sid:"none", desc:""},
    {t:"｢恋の約束｣", s:2, hp:2300, atk:550, sid:"naiko_s2", desc:"攻撃した敵に毒付与\n毎ドロー時最大100ダメ"},
    {t:"｢推しが見つかる3分ちょい！2023ver.｣", s:3, hp:3600, atk:850, sid:"naiko_s3", desc:"条件を満たすと相手の手札を\n選んで捨てさせる"},
    {t:"｢星降るフェアリーテイル｣", s:3, hp:4000, atk:800, sid:"naiko_s3_2", desc: "バトルゾーンで長押し発動\n敵の待機スキルの禁止"}
  ]
};

// ゲーム変数
let money = 999999, notes = 99999, keys = 0;
let stock = [], deck = [];
let currentUpCard = null, pressTimer;
let pLife, eLife, bHand, bZone, bBench, eZone, eBench, bDeck, eDeck, hasAttacked, selCardId, currentDiff;
let attackingId = null;
let isSilenceMode = false, silencerId = null;

window.onload = () => { updateStatus(); };

function updateStatus() {
  document.getElementById("val-money").innerText = Math.floor(money);
  document.getElementById("val-notes").innerText = Math.floor(notes);
  document.getElementById("val-keys").innerText = keys;
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==='stock') showStock();
}

function createCard(minStar = 1) {
  const names = Object.keys(cardMaster);
  const name = names[Math.floor(Math.random() * names.length)];
  const variants = cardMaster[name];
  let star = (minStar === 2) ? (Math.random() < 0.2 ? 3 : 2) : (Math.random() < 0.1 ? 3 : (Math.random() < 0.4 ? 2 : 1));
  const v = variants.find(x => x.s == star) || variants[0];
  return { id: Math.random().toString(36).substr(2, 9), name, title: v.t, stars: v.s, level: 1, hp: v.hp, maxHp: v.hp, atk: v.atk, sid: v.sid, desc: v.desc, hasTriggered: false, tempAtkBuff: 0, poisonInfo: null, isSilenced: false };
}

function cardHTML(c, type) {
  let cls = `card star${c.stars}`;
  if(type === 'battle' && attackingId === c.id) cls += " attacking";
  if(type === 'enemy' && attackingId) cls += " targetable";
  if(c.isSilenced) cls += " silenced";

  return `<div class="${cls}" onclick="cardClick('${c.id}', '${type}')" onmousedown="startPress('${c.id}')" onmouseup="endPress()" onmouseleave="endPress()" ontouchstart="startPress('${c.id}')" ontouchend="endPress()">
    <div class="title">${c.title}</div><div class="name">${c.name}</div><div class="skill-text">${c.desc}</div>
    <div class="stats"><span style="color:#ff6666">H:${Math.floor(c.hp)}</span><span style="color:#66ffff">A:${Math.floor(getActualAtk(c))}</span></div>
    <div style="display:flex; justify-content:space-between; align-items:center;"><span class="stars">${"★".repeat(c.stars)}</span><span>Lv.${c.level}</span></div>
  </div>`;
}

function getActualAtk(card) {
  let base = card.atk + (card.level * 20) + (card.tempAtkBuff || 0);
  if (card.sid === "riura_s3" && bZone.some(c => c.id !== card.id && c.title === card.title)) {
    base += (card.level >= 100) ? 1000 : (card.level >= 50 ? 500 : 300);
  }
  return base;
}

function triggerSkill(timing, card) {
  if (!card || card.sid === "none" || card.isSilenced) return;
  const lv = card.level;
  switch(card.sid) {
    case "riura_s2": if (timing === "onEnemyDraw") { let d = (lv >= 100) ? 100 : (lv >= 50 ? 50 : 10); eLife -= d; alert("りうら：相手に" + d + "ダメージ"); } break;
    case "riura_s3_2": if ((timing === "onPlay" || timing === "onMove") && !card.hasTriggered) { let d = bZone.some(c=>c.id==card.id) ? (lv>=100?800:lv>=50?500:300) : (lv>=100?500:lv>=50?300:100); if(eZone[0]) { eZone[0].hp -= d; alert("りうら：敵HPを減少"); } card.hasTriggered = true; } break;
    case "hotoke_s2": if (timing === "onPlay") { let n = (lv>=100?3:lv>=50?2:1); for(let i=0;i<n;i++) if(bDeck.length>0) bHand.push(bDeck.pop()); alert("-hotoke-：追加ドロー"); } break;
    case "hotoke_s3": if (timing === "onTurnStart" && bZone.some(c=>c.id==card.id)) { let h = (lv>=100?200:lv>=50?100:50); pLife += h; } break;
    case "hotoke_s3_2": if (timing === "onTurnStart" && bBench.some(c=>c.id==card.id) && bZone.length==2 && bZone[0].title==bZone[1].title) { let b = (lv>=100?1500:lv>=50?1000:500); bZone.forEach(c=>{c.hp+=b;c.maxHp+=b;}); alert("-hotoke-：前衛強化"); } break;
    case "shou_s2": if (timing === "onBench" || timing === "onPlay") { card.tempAtkBuff = (lv>=100?700:lv>=50?500:300); alert("初兎：攻撃力UP"); } break;
    case "shou_s3_2": if (timing === "onDamage") { let r = (lv>=100?1000:lv>=50?500:300); eLife -= r; alert("初兎：ダメージ反射！"); } break;
    case "naiko_s3": if (timing === "onDiscard") startDiscardGame(); break;
    case "naiko_s3_2": if (timing === "onLongPress") { isSilenceMode = true; silencerId = card.id; alert("封印モード：相手の待機カードを1枚選んでください"); } break;
  }
}

function startDiscardGame() {
  if (eDeck.length == 0) return;
  let c = prompt("手札破壊！1-3の数字を入力");
  let discarded = eDeck.splice(Math.floor(Math.random()*eDeck.length), 1)[0];
  alert("BOTの「" + discarded.title + discarded.name + "」を捨てさせた！");
}

function executeAttack(atkId, targetId) {
  let atkCard = bZone.find(x => x.id == atkId);
  let finalAtk = getActualAtk(atkCard);
  if (targetId === 'direct') {
    eLife -= finalAtk; alert("ダイレクトアタック！");
  } else {
    let target = eZone.find(x => x.id == targetId);
    if (target.sid === "shou_s3_2") triggerSkill("onDamage", target);
    let excess = finalAtk - target.hp;
    target.hp -= finalAtk;
    if (atkCard.sid === "naiko_s2") { target.poisonInfo = { dmg: (atkCard.level>=100?100:atkCard.level>=50?80:50), id: atkCard.id }; alert("毒を付与！"); }
    if (target.hp <= 0) { eZone.splice(eZone.findIndex(x=>x.id==targetId),1); if(excess>0) eLife-=excess; refillEnemy(); }
  }
  attackingId = null; hasAttacked = true; updateBattleUI(); checkEnd();
}

function passTurn() {
  refillEnemy();
  if (eZone[0]) {
    let dmg = eZone[0].atk + (eZone[0].level * 15);
    if (bZone[0]) {
      if (bZone[0].sid === "shou_s3_2") triggerSkill("onDamage", bZone[0]);
      bZone[0].hp -= dmg; if(bZone[0].hp<=0) bZone.shift();
    } else { pLife -= dmg; }
  }
  checkEnd();
  // 毒ダメージ
  eZone.concat(eBench).forEach(ec => { if(ec.poisonInfo && bZone.concat(bBench).some(pc=>pc.id==ec.poisonInfo.id)) ec.hp -= ec.poisonInfo.dmg; });
  // ないこ手札破壊カウント
  bZone.concat(bBench).forEach(c => { if(c.sid=="naiko_s3") { c.sc = (c.sc||0)+1; if(c.sc >= (c.level>=100?2:c.level>=50?3:4)) { triggerSkill("onDiscard", c); c.sc=0; } } });
  // ドロー枚数判定 (初兎)
  let dc = 1;
  bZone.concat(bBench).forEach(c => { if(c.sid=="shou_s3") { let isB = bZone.some(x=>x.id==c.id); if(c.level>=100 || (c.level>=50 && isB) || (isB && Math.random()<0.5)) dc++; } });
  for(let i=0;i<dc;i++) if(bDeck.length>0) bHand.push(bDeck.pop());
  bZone.concat(bBench).forEach(c => { triggerSkill("onEnemyDraw", c); triggerSkill("onTurnStart", c); c.tempAtkBuff = 0; });
  hasAttacked = false; attackingId = null; alert("自分のターン！"); updateBattleUI();
}

function cardClick(id, type) {
  if (type === 'stock') {
    let t = stock.find(c => c.id == id);
    if (deck.length < 20 && !deck.some(c => c.name == t.name && c.title == t.title)) { deck.push(stock.splice(stock.findIndex(c => c.id == id), 1)[0]); showStock(); }
  } else if (type === 'deck') { stock.push(deck.splice(deck.findIndex(c => c.id == id), 1)[0]); showStock(); }
  else if (type === 'hand') { selCardId = id; document.getElementById("selName").innerText = bHand.find(x=>x.id==id).name; document.getElementById("actionPanel").style.display = "block"; }
  else if (type === 'bench') { if(bZone.length < 2) { let c = bBench.splice(bBench.findIndex(x=>x.id==id), 1)[0]; bZone.push(c); triggerSkill("onMove", c); updateBattleUI(); } }
  else if (type === 'battle') { if(!hasAttacked) { attackingId = (attackingId === id) ? null : id; updateBattleUI(); } }
  else if (type === 'enemy') { if(attackingId) executeAttack(attackingId, id); }
  else if (type === 'enemyBench' && isSilenceMode) { let target = eBench.find(x=>x.id==id); if(target) { target.isSilenced = true; isSilenceMode = false; alert(target.name + "を封印した！"); updateBattleUI(); } }
}

function confirmPlay(t) {
  let idx = bHand.findIndex(x => x.id == selCardId); let c = bHand.splice(idx, 1)[0];
  if (t === 'battle' && bZone.length < 2) { bZone.push(c); triggerSkill("onPlay", c); }
  else if (t === 'bench' && bBench.length < 3) { bBench.push(c); triggerSkill("onBench", c); }
  else bHand.push(c);
  document.getElementById("actionPanel").style.display = "none"; updateBattleUI();
}

function startBattle(d) {
  currentDiff = d; pLife = 5000; eLife = 5000; bZone = []; bBench = []; eZone = []; eBench = []; bHand = []; hasAttacked = false; bDeck = JSON.parse(JSON.stringify(deck)).sort(() => Math.random() - 0.5);
  eDeck = []; let elv = d=='easy'?1:d=='normal'?30:60; for(let i=0;i<30;i++){ let ec=createCard(); ec.level=elv; ec.hp=ec.maxHp=elv*400+1000; eDeck.push(ec); }
  for(let i=0;i<5;i++) bHand.push(bDeck.pop()); for(let i=0;i<2;i++) eZone.push(eDeck.pop()); for(let i=0;i<3;i++) eBench.push(eDeck.pop());
  showScreen('battle'); updateBattleUI();
}

function refillEnemy() { while(eZone.length<2 && eBench.length>0) eZone.push(eBench.shift()); while(eBench.length<3 && eDeck.length>0) eBench.push(eDeck.pop()); }
function updateBattleUI() {
  document.getElementById("eLife").innerText = Math.floor(eLife); document.getElementById("pLife").innerText = Math.floor(pLife);
  document.getElementById("directMark").style.display = (attackingId && eZone.length === 0) ? "inline" : "none";
  document.getElementById("hand").innerHTML = bHand.map(c => cardHTML(c, 'hand')).join("");
  document.getElementById("battleZone").innerHTML = bZone.map(c => cardHTML(c, 'battle')).join("");
  document.getElementById("benchZone").innerHTML = bBench.map(c => cardHTML(c, 'bench')).join("");
  document.getElementById("enemyZone").innerHTML = eZone.map(c => cardHTML(c, 'enemy')).join("");
  document.getElementById("enemyBenchZone").innerHTML = eBench.map(c => cardHTML(c, 'enemyBench')).join("");
}
function startPress(id) { pressTimer = setTimeout(() => { let c = bZone.concat(bBench, stock, deck, bHand).find(x=>x.id==id); if(c.sid=="naiko_s3_2" && bZone.some(x=>x.id==id)) triggerSkill("onLongPress", c); else { currentUpCard = c; showScreen('upgrade'); updateUpgradeUI(); } }, 600); }
function endPress() { clearTimeout(pressTimer); }
function updateUpgradeUI() { document.getElementById("upgradeCard").innerHTML = cardHTML(currentUpCard, 'none'); let cC = currentUpCard.level * 30 + 50, cN = Math.floor(currentUpCard.level / 2) + 5; document.getElementById("upgradeCost").innerText = `必要: 💰${cC} / 🎶${cN}`; }
function levelUp() { let cC = currentUpCard.level * 30 + 50, cN = Math.floor(currentUpCard.level / 2) + 5; if (money>=cC && notes>=cN && currentUpCard.level<100) { money-=cC; notes-=cN; currentUpCard.level++; currentUpCard.maxHp+=400; currentUpCard.hp=currentUpCard.maxHp; currentUpCard.atk+=60; updateStatus(); updateUpgradeUI(); } }
function drawCard() { if(money>=100) { money-=100; stock.push(createCard()); updateStatus(); showScreen('stock'); } }
function draw10() { if(money>=900) { money-=900; for(let i=0;i<10;i++) stock.push(createCard()); updateStatus(); showScreen('stock'); } }
function checkEnd() { if(eLife<=0 || (eZone.length==0 && eDeck.length==0)) finishBattle("WIN"); else if(pLife<=0 || (bZone.length==0 && bBench.length==0 && bHand.length==0)) finishBattle("LOSE"); }
function finishBattle(res) { alert(res=="WIN"?"勝利！":"敗北…"); showScreen('battleSelect'); }
function showStock() { document.getElementById("deckCount").innerText = deck.length; document.getElementById("deckArea").innerHTML = deck.map(c => cardHTML(c, 'deck')).join(""); document.getElementById("stockList").innerHTML = stock.map(c => cardHTML(c, 'stock')).join(""); }
function selectTarget(t) { if(t=='direct' && attackingId && eZone.length==0) executeAttack(attackingId, 'direct'); }
function openChest() { money += 5000; updateStatus(); alert("テスト用5000コイン獲得"); }
function cancelPlay() { document.getElementById("actionPanel").style.display = "none"; }
</script>
</body>
</html>
