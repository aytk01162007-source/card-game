<!DOCTYPE html>
<html>
<head>
  <title>カードゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;
      color: white;
      text-align: center;
    }

    #money {
      position: fixed;
      top: 10px;
      left: 10px;
    }

    #menu {
      position: fixed;
      top: 10px;
      right: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
    }

    .screen {
      display: none;
      padding-top: 60px;
    }

    .active {
      display: block;
    }

  #stockList {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  display: block;
      width: 80px;
      height: 110px;
      border: 2px solid white;
      border-radius: 8px;
      margin: 5px;
      padding: 5px;
      background: #333;
      cursor: pointer;
      font-size: 12px;
    }

    .rare {
      border-color: gold;
    }
    #deckArea {
  border: 2px solid white;
  padding: 10px;
  margin: 10px;
  min-height: 120px;
}
  </style>
</head>
<body>

<div id="money">💰 900</div>

<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">ストック</button>
  <button onclick="showScreen('battleSelect')">対戦</button>
  <button onclick="showScreen('coin')">コイン</button>
</div>

<!-- ガチャ -->
<div id="draw" class="screen active">
  <h2>ガチャ</h2>
  <button onclick="drawCard()">1回（100）</button>
  <button onclick="draw10()">10連（900）</button>
  <div id="drawResult"></div>
</div>

<!-- ストック -->
<div id="stock" class="screen">
  <h2>デッキ（20枚まで）</h2>
  <div id="deckArea"></div>

  <h2>ストック（タップでデッキ追加 / 長押しで強化）</h2>
  <div id="stockList"></div>
</div>

<!-- レベルアップ画面 -->
<div id="upgrade" class="screen">
  <h2>カード強化</h2>
  <div id="upgradeCard"></div>
  <button onclick="levelUp()">レベルアップ（100）</button>
  <button onclick="showScreen('stock')">戻る</button>
</div>

<!-- BOT選択 -->
<div id="battleSelect" class="screen">
  <h2>難易度選択</h2>
  <button onclick="startSelect('easy')">弱い（+100）</button>
  <button onclick="startSelect('normal')">普通（+200）</button>
  <button onclick="startSelect('hard')">強い（+300）</button>
</div>

<!-- 対戦 -->
<div id="battle" class="screen">
  <h2>対戦</h2>

  <div>自分ライフ: <span id="pLife">5000</span></div>
  <div>相手ライフ: <span id="eLife">5000</span></div>

  <h3>手札</h3>
  <div id="hand"></div>

  <h3>バトルゾーン（タップで攻撃）</h3>
  <div id="battleZone"></div>

  <h3>待機ゾーン</h3>
  <div id="benchZone"></div>

  <button onclick="drawPhase()">ドロー</button>
  <button onclick="passTurn()">パス</button>

  <h3>相手バトルゾーン</h3>
  <div id="enemyZone"></div>

  <h2 id="result"></h2>
</div>

<!-- コイン -->
<div id="coin" class="screen">
  <h2>コイン</h2>
  <button onclick="getCoin()">+100</button>
</div>

<script>
let money = 900;
let stock = [];
let selected = [];
let difficulty = "easy";
let currentCardIndex = null;
  let deck = [];

// キャラ一覧
const characters = [
"りうら","-hotoke-","初兎","ないこ","If","悠佑",
"Coe.","Relu","如月ゆう","くに","こったろ","暇72",
"雨乃こさめ","いるま","LAN","すち","みこと",
"ARKHE","かなめ","うるみや","しの","甘夢れむ",
"しゃるろ","天來らいむ","ひづみ","らみ",
"初噛みつき","ユエル","リンドウネイロ"
];

// 表示更新
function updateMoney(){
  document.getElementById("money").innerText="💰 "+money;
}

// 画面切り替え
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="stock") showStock();
  if(id==="battle") showCards();
}

// カード生成
function createCard(){
  let name = characters[Math.floor(Math.random()*characters.length)];
  let isRare = Math.random() < 0.03;

  return {
    name:name,
    rarity:isRare?"rare":"normal",
    level:1
  };
}

// ガチャ
function drawCard(){
  if(money<100) return alert("コイン不足");
  money-=100; updateMoney();

  let c=createCard();
  stock.push(c);

  showDraw(c);
}

function draw10(){
  if(money<900) return alert("コイン不足");
  money-=900; updateMoney();

  let html="";
  for(let i=0;i<10;i++){
    let c=createCard();
    stock.push(c);
    html+=cardHTML(c);
  }
  document.getElementById("drawResult").innerHTML=html;
}

function showDraw(c){
  document.getElementById("drawResult").innerHTML=cardHTML(c);
}

// カード表示
function cardHTML(c){
  return `<div class="card ${c.rarity}">
    <div>${c.name}</div>
    <div>Lv.${c.level}</div>
    <div>${c.rarity}</div>
  </div>`;
}

// ストック
function showStock(){
  function addToDeck(i){
  if(deck.length >= 20) return alert("デッキは20枚まで");

  if(deck.some(c => c.name === stock[i].name)){
    return alert("同じカードは入れられない");
  }

  deck.push({...stock[i]});
  showStock();
}

function removeFromDeck(i){
  deck.splice(i,1);
  showStock();
}

  // デッキ表示
  document.getElementById("deckArea").innerHTML =
    deck.map((c,i)=>`<div class="card" onclick="removeFromDeck(${i})">
      ${c.name}<br>Lv.${c.level}
    </div>`).join("");

  // ストック表示（タップでデッキへ）
  document.getElementById("stockList").innerHTML =
    stock.map((c,i)=>`<div onclick="addToDeck(${i})">${cardHTML(c)}</div>`).join("");
}

// 強化画面
function openUpgrade(i){
  currentCardIndex=i;
  showScreen("upgrade");
  document.getElementById("upgradeCard").innerHTML=cardHTML(stock[i]);
}

// レベルアップ
function levelUp(){
  let c=stock[currentCardIndex];
  if(money<100) return alert("コイン不足");
  if(c.level>=99) return alert("最大レベル");

  money-=100;
  c.level++;
  updateMoney();

  document.getElementById("upgradeCard").innerHTML=cardHTML(c);
}

// 対戦準備
function startSelect(diff){
  difficulty=diff;
  showScreen("battle");
}

// カード選択
function showCards(){
  selected=[];
  document.getElementById("selectCards").innerHTML=
    stock.map((c,i)=>`<div onclick="selectCard(${i},this)">${cardHTML(c)}</div>`).join("");
}

function selectCard(i,el){
  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
    el.style.border="2px solid white";
  }else{
    if(selected.length>=5) return;
    selected.push(i);
    el.style.border="2px solid yellow";
  }
}

// 強さ計算
function getPower(c){
  let bonus=c.rarity==="rare"?3:1;
  return c.level*bonus+5;
}

// BOTカード
function createBotCard(){
  let c=createCard();
  c.level=Math.floor(Math.random()*5)+1;
  return c;
}

// バトル
function startBattle(){
  // ===== 対戦用データ =====
let playerLife = 5000;
let enemyLife = 5000;

let deck = [];
let hand = [];
let battleZone = [];
let benchZone = [];
let enemyZone = [];

let hasAttacked = false;

// ===== 対戦開始 =====
function startBattle(){

  if(selected.length !== 5) return alert("5枚選んで");

  // デッキ20枚
  if(deck.length !== 20) return alert("デッキは20枚必要");
deck = [...deck];

  while(deck.length < 20){
    deck.push(createCard());
  }

  // 初期化
  hand = [];
  battleZone = [];
  benchZone = [];
  enemyZone = [];
  playerLife = 5000;
  enemyLife = 5000;

  // 初手5枚
  for(let i=0;i<5;i++){
    hand.push(deck.pop());
  }

  // 敵
  enemyZone.push(createBotCard(), createBotCard());

  showScreen("battle");
  updateBattleUI();
}

// ===== ドロー =====
function drawPhase(){
  if(deck.length>0){
    hand.push(deck.pop());
  }
  hasAttacked = false;
  updateBattleUI();
}

// ===== カード出す =====
function playToField(i){

  let c = hand[i];

  if(battleZone.length < 2){
    battleZone.push(c);
  }else if(benchZone.length < 3){
    benchZone.push(c);
  }else{
    alert("場がいっぱい");
    return;
  }

  hand.splice(i,1);
  updateBattleUI();
}

// ===== 攻撃 =====
function attack(i){

  if(hasAttacked) return alert("このターンはもう攻撃済み");
  if(enemyZone.length===0) return;

  let attacker = battleZone[i];
  let target = enemyZone[0];

  target.def -= (attacker.level * 200);

  if(target.def <= 0){
    enemyLife += target.def;
    enemyZone.splice(0,1);
  }

  hasAttacked = true;
  endTurn();
}

// ===== パス =====
function passTurn(){
  endTurn();
}

// ===== ターン終了 =====
function endTurn(){

  // 敵攻撃
  if(enemyZone.length && battleZone.length){
    let e = enemyZone[0];
    let t = battleZone[0];

    t.def -= (e.level * 200);

    if(t.def <= 0){
      battleZone.splice(0,1);
    }
  }

  // 前に出る
  while(battleZone.length < 2 && benchZone.length > 0){
    battleZone.push(benchZone.shift());
  }

  drawPhase();
}

// ===== UI更新 =====
function updateBattleUI(){

  document.getElementById("pLife").innerText = playerLife;
  document.getElementById("eLife").innerText = enemyLife;

  document.getElementById("hand").innerHTML =
    hand.map((c,i)=>`<div class="card" onclick="playToField(${i})">
      ${c.name}<br>Lv.${c.level}
    </div>`).join("");

  document.getElementById("battleZone").innerHTML =
    battleZone.map((c,i)=>`<div class="card" onclick="attack(${i})">
      ${c.name}<br>Lv.${c.level}<br>DEF:${c.def||1000}
    </div>`).join("");

  document.getElementById("benchZone").innerHTML =
    benchZone.map(c=>`<div class="card">
      ${c.name}<br>Lv.${c.level}
    </div>`).join("");

  document.getElementById("enemyZone").innerHTML =
    enemyZone.map(c=>`<div class="card">
      ${c.name}<br>Lv.${c.level}<br>DEF:${c.def||1000}
    </div>`).join("");
}

  document.getElementById("player").innerHTML=player.map(cardHTML).join("");
  document.getElementById("bot").innerHTML=bot.map(cardHTML).join("");

  let p=player.reduce((a,c)=>a+getPower(c),0);
  let b=bot.reduce((a,c)=>a+getPower(c),0);

  let reward=difficulty==="easy"?100:difficulty==="normal"?200:300;

  let result="";
  if(p>b){
    result="勝ち！ +"+reward;
    money+=reward;
    if(Math.random()<0.1){
      let drop=createCard();
      drop.rarity="normal";
      stock.push(drop);
      result+="<br>カードGET！";
    }
  }else if(p<b){
    result="負け！";
  }else{
    result="引き分け";
  }

  updateMoney();

  document.getElementById("result").innerHTML=
    `あなた ${p} - BOT ${b}<br>${result}`;
}

// コイン
function getCoin(){
  money+=100;
  updateMoney();
}
</script>

</body>
</html>
