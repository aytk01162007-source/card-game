<!DOCTYPE html>
<html>
<head>
  <title>カードゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;
      color: white;
      text-align: center;
    }

    #money {
      position: fixed;
      top: 10px;
      left: 10px;
    }

    #menu {
      position: fixed;
      top: 10px;
      right: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
    }

    .screen {
      display: none;
      padding-top: 60px;
    }

    .active {
      display: block;
    }

    .card {
      display: inline-block;
      width: 60px;
      height: 90px;
      border: 2px solid white;
      border-radius: 8px;
      margin: 5px;
      line-height: 90px;
      background: #333;
    }

    .selected {
      border: 2px solid yellow;
    }
  </style>
</head>
<body>

<div id="money">💰 900</div>

<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">ストック</button>
  <button onclick="showScreen('battleSelect')">対戦</button>
  <button onclick="showScreen('coin')">コイン</button>
</div>

<!-- ガチャ -->
<div id="draw" class="screen active">
  <h2>ガチャ</h2>
  <button onclick="drawCard()">1回（100）</button>
  <button onclick="draw10()">10連（900）</button>
  <div id="drawResult"></div>
</div>

<!-- ストック -->
<div id="stock" class="screen">
  <h2>ストック</h2>
  <div id="stockList"></div>
</div>

<!-- BOT選択 -->
<div id="battleSelect" class="screen">
  <h2>難易度選択</h2>
  <button onclick="startSelect('easy')">弱い（+100）</button>
  <button onclick="startSelect('normal')">普通（+200）</button>
  <button onclick="startSelect('hard')">強い（+300）</button>
</div>

<!-- 対戦 -->
<div id="battle" class="screen">
  <h2>カードを5枚選択</h2>
  <div id="selectCards"></div>
  <button onclick="startBattle()">決定</button>

  <h3>自分</h3>
  <div id="player"></div>

  <h3>BOT</h3>
  <div id="bot"></div>

  <h2 id="result"></h2>

  <button onclick="backToSelect()">もう一度</button>
</div>

<!-- コイン -->
<div id="coin" class="screen">
  <h2>コイン</h2>
  <button onclick="getCoin()">+100</button>
</div>

<script>
let stock = [];
let selected = [];
let money = 900;
let difficulty = "easy";

function updateMoney() {
  document.getElementById("money").innerText = "💰 " + money;
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "stock") showStock();
}

// ガチャ
function drawCard() {
  if (money < 100) return alert("コイン不足");
  money -= 100; updateMoney();

  let num = Math.floor(Math.random() * 10) + 1;
  stock.push(num);

  document.getElementById("drawResult").innerHTML =
    `<div class="card">${num}</div>`;
}

function draw10() {
  if (money < 900) return alert("コイン不足");
  money -= 900; updateMoney();

  let result = "";
  for (let i = 0; i < 10; i++) {
    let num = Math.floor(Math.random() * 10) + 1;
    stock.push(num);
    result += `<div class="card">${num}</div>`;
  }
  document.getElementById("drawResult").innerHTML = result;
}

// ストック
function showStock() {
  document.getElementById("stockList").innerHTML =
    stock.map(n => `<div class="card">${n}</div>`).join("");
}

// 難易度選択
function startSelect(diff) {
  difficulty = diff;
  showScreen("battle");
  showCards();
}

// カード選択
function showCards() {
  selected = [];
  document.getElementById("selectCards").innerHTML =
    stock.map((n,i)=>
      `<div class="card" onclick="selectCard(${i},this)">${n}</div>`
    ).join("");
}

function selectCard(i,el) {
  if (selected.includes(i)) {
    selected = selected.filter(x=>x!==i);
    el.classList.remove("selected");
  } else {
    if (selected.length>=5) return;
    selected.push(i);
    el.classList.add("selected");
  }
}

// BOT生成（強さ別）
function getBotCard() {
  if (difficulty === "easy") return Math.floor(Math.random()*6)+1;
  if (difficulty === "normal") return Math.floor(Math.random()*8)+2;
  if (difficulty === "hard") return Math.floor(Math.random()*6)+5;
}

// バトル
function startBattle() {
  if (selected.length !== 5) return alert("5枚選んで");

  let player = selected.map(i=>stock[i]);
  let bot = [];

  for (let i=0;i<5;i++) {
    bot.push(getBotCard());
  }

  document.getElementById("player").innerHTML =
    player.map(n=>`<div class="card">${n}</div>`).join("");

  document.getElementById("bot").innerHTML =
    bot.map(n=>`<div class="card">${n}</div>`).join("");

  let p = player.reduce((a,b)=>a+b,0);
  let b = bot.reduce((a,b)=>a+b,0);

  let reward = difficulty==="easy"?100: difficulty==="normal"?200:300;

  let result="";
  if (p>b) {
    result="勝ち！ +" + reward;
    money += reward;
    updateMoney();
  } else if (p<b) result="負け！";
  else result="引き分け";

  document.getElementById("result").innerHTML =
    `あなた ${p} - BOT ${b}<br>${result}`;
}

// 戻る
function backToSelect() {
  showScreen("battleSelect");
}

// コイン
function getCoin() {
  money += 100;
  updateMoney();
}
</script>

</body>
</html>
