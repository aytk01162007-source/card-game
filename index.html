<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カードゲーム - 決定版</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #222; color: white; text-align: center; }
    #money { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 5px; border: 1px solid gold; color: gold; font-weight: bold; }
    #menu { position: fixed; top: 10px; right: 10px; z-index: 100; }
    button { margin: 5px; padding: 10px 15px; cursor: pointer; background: #444; color: white; border: 1px solid #888; border-radius: 4px; font-weight: bold; }
    button:hover { background: #666; border-color: #ccc; }
    
    .screen { display: none; padding-top: 70px; padding-bottom: 50px; }
    .active { display: block; }
    
    .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 140px; padding: 10px; background: rgba(255,255,255,0.05); margin: 10px; border-radius: 10px; border: 1px solid #444; }
    .card { width: 95px; height: 135px; border: 2px solid white; border-radius: 8px; background: #333; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; box-sizing: border-box; transition: transform 0.1s; }
    .card:active { transform: scale(0.95); }
    .rare { border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.6); background: linear-gradient(135deg, #333, #4a4a00); }
    .disabled { opacity: 0.5; filter: grayscale(1); cursor: default; }

    .battle-info { background: #111; padding: 15px; display: flex; justify-content: space-around; font-weight: bold; font-size: 1.1em; border-bottom: 2px solid #444; }
    .zone-label { font-size: 0.9em; color: #ffcc00; margin-top: 15px; font-weight: bold; }

    #actionPanel { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); padding: 25px; border-radius: 15px; border: 3px solid gold; z-index: 200; box-shadow: 0 0 30px rgba(0,0,0,1); }
    .coin-btn { font-size: 1.5em; padding: 20px 40px; background: gold; color: black; border: none; border-radius: 10px; }
    .coin-btn:hover { background: #ffd700; transform: scale(1.05); }
  </style>
</head>
<body>

<!-- お金表示 -->
<div id="money">💰 900</div>

<!-- 上部メニュー -->
<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">デッキ編成</button>
  <button onclick="showScreen('battleSelect')">対戦</button>
  <button onclick="showScreen('coin')">コイン補充</button>
</div>

<!-- ガチャ画面 -->
<div id="draw" class="screen active">
  <h2>ガチャ</h2>
  <button onclick="drawCard()">1回（100）</button>
  <button onclick="draw10()">10連（900）</button>
  <div id="drawResult" class="card-container"></div>
</div>

<!-- デッキ編成画面 -->
<div id="stock" class="screen">
  <h2>デッキ (<span id="deckCount">0</span>/20)</h2>
  <div id="deckArea" class="card-container"></div>
  <h2>ストック (タップで追加 / 右クリで強化)</h2>
  <div id="stockList" class="card-container"></div>
</div>

<!-- 強化画面 -->
<div id="upgrade" class="screen">
  <h2>カード強化</h2>
  <div id="upgradeCard" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
  <p>100コインでレベルを1上げます</p>
  <button onclick="levelUp()">強化する！</button>
  <button onclick="showScreen('stock')">戻る</button>
</div>

<!-- 対戦選択画面 -->
<div id="battleSelect" class="screen">
  <h2>対戦相手を選択</h2>
  <button onclick="startBattle('easy')">初級（報酬100）</button>
  <button onclick="startBattle('normal')">中級（報酬200）</button>
  <button onclick="startBattle('hard')">上級（報酬300）</button>
  <p style="color: #ff4444;">※デッキにカードを20枚入れてください</p>
  <p style="font-size: 0.8em; color: #aaa;">【全滅ルール】場のカードが0になると、ライフに関わらず即敗北！</p>
</div>

<!-- 対戦中画面 -->
<div id="battle" class="screen">
  <div class="battle-info">
    <div style="color: #ff6666;">敵HP: <span id="eLife">5000</span></div>
    <div style="color: #66ff66;">自分HP: <span id="pLife">5000</span></div>
  </div>

  <div class="zone-label">相手バトルゾーン</div>
  <div id="enemyZone" class="card-container"></div>

  <div class="zone-label">自分バトルゾーン (タップで攻撃)</div>
  <div id="battleZone" class="card-container"></div>

  <div class="zone-label">待機ゾーン</div>
  <div id="benchZone" class="card-container"></div>

  <div class="zone-label">手札</div>
  <div id="hand" class="card-container"></div>

  <button onclick="passTurn()" style="background: #822; width: 90%; margin: 10px auto; display: block; padding: 15px;">ターン終了（相手の番へ）</button>
</div>

<!-- 配置選択パネル -->
<div id="actionPanel">
  <div id="selectedCardName" style="margin-bottom:15px; font-weight:bold; font-size: 1.2em; color: gold;"></div>
  <button onclick="confirmPlay('battle')" style="background: #282; padding: 15px;">バトルゾーンに出す</button>
  <button onclick="confirmPlay('bench')" style="background: #228; padding: 15px;">待機ゾーンに出す</button><br>
  <button onclick="cancelPlay()" style="background:#444; margin-top:15px;">やめる</button>
</div>

<!-- コイン補充画面 -->
<div id="coin" class="screen">
  <h2>コイン無料補充</h2>
  <p>ボタンを押すと100コイン獲得できます！</p>
  <br><br>
  <button class="coin-btn" onclick="getCoin()">💰 コインをもらう</button>
  <br><br>
  <p id="coinAlert" style="color: gold; font-weight: bold;"></p>
</div>

<script>
let money = 900;
let stock = [];
let deck = [];
let currentCardIndex = null;

// 対戦変数
let pLife, eLife, bHand, bZone, bench, eZone, bDeck, eDeck;
let hasAttacked = false;
let diff = "easy";
let selectedCardIdx = null;

const characters = ["りうら","-hotoke-","初兎","ないこ","If","悠佑","Coe.","Relu","如月ゆう","くに","こったろ","暇72","雨乃こさめ","いるま","LAN","すち","みこと","ARKHE","かなめ","うるみや","しの","甘夢れむ","しゃるろ","天來らいむ","ひづみ","らみ","初噛みつき","ユエル","リンドウネイロ"];

function updateMoney(){ 
  document.getElementById("money").innerText="💰 " + money; 
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==='stock') showStock();
  if(id==='coin') document.getElementById("coinAlert").innerText = ""; 
}

// カード生成
function createCard(lv = 1){
  let name = characters[Math.floor(Math.random()*characters.length)];
  let isRare = Math.random()<0.05;
  return { name: name, rarity: isRare?"rare":"normal", level: lv, hp: lv*500, maxHp: lv*500 };
}

function cardHTML(c, i, type){
  let action = "";
  if(type==='stock') action = `onclick="addToDeck(${i})"`;
  if(type==='deck') action = `onclick="removeFromDeck(${i})" oncontextmenu="openUpgrade(${i});return false;"`;
  if(type==='hand') action = `onclick="openActionPanel(${i})"`;
  if(type==='battle') action = `onclick="attack(${i})"`;
  let disClass = (type==='battle' && hasAttacked) ? "disabled" : "";

  return `<div class="card ${c.rarity} ${disClass}" ${action}>
    <div style="font-weight:bold">${c.name}</div>
    <div>Lv.${c.level}</div>
    <div style="color:#ff6666">HP:${c.hp}</div>
    <div style="font-size:8px; opacity:0.6;">${c.rarity.toUpperCase()}</div>
  </div>`;
}

// ガチャ
function drawCard(){
  if(money<100) return alert("コイン不足");
  money-=100; updateMoney();
  let c=createCard(); stock.push(c);
  document.getElementById("drawResult").innerHTML = cardHTML(c);
}
function draw10(){
  if(money<900) return alert("コイン不足");
  money-=900; updateMoney();
  let html="";
  for(let i=0;i<10;i++){ let c=createCard(); stock.push(c); html+=cardHTML(c); }
  document.getElementById("drawResult").innerHTML = html;
}

// デッキ
function showStock(){
  document.getElementById("deckCount").innerText = deck.length;
  document.getElementById("deckArea").innerHTML = deck.map((c,i)=>cardHTML(c,i,'deck')).join("");
  document.getElementById("stockList").innerHTML = stock.map((c,i)=>cardHTML(c,i,'stock')).join("");
}
function addToDeck(i){
  if(deck.length>=20) return alert("20枚まで");
  deck.push(stock.splice(i,1)[0]); showStock();
}
function removeFromDeck(i){
  stock.push(deck.splice(i,1)[0]); showStock();
}
function openUpgrade(i){
  currentCardIndex=i; showScreen("upgrade");
  document.getElementById("upgradeCard").innerHTML = cardHTML(deck[i]);
}
function levelUp(){
  if(money<100) return alert("コイン不足");
  let c=deck[currentCardIndex];
  money-=100; c.level++; c.maxHp = c.level*500; c.hp = c.maxHp;
  updateMoney(); document.getElementById("upgradeCard").innerHTML = cardHTML(c);
}

// バトル
function startBattle(d){
  if(deck.length<20) return alert("デッキを20枚にしてください");
  diff = d; pLife=5000; eLife=5000; bZone=[]; bench=[]; eZone=[]; bHand=[];
  bDeck = JSON.parse(JSON.stringify(deck)).sort(()=>Math.random()-0.5);
  eDeck = [];
  let enemyLv = d==="easy"?1 : d==="normal"?6 : 14;
  for(let i=0; i<30; i++) eDeck.push(createCard(enemyLv + Math.floor(Math.random()*3)));

  for(let i=0;i<5;i++) bHand.push(bDeck.pop());
  eZone.push(eDeck.pop());
  if(diff!=="easy") eZone.push(eDeck.pop());

  showScreen("battle");
  updateBattleUI();
}

function updateBattleUI(){
  document.getElementById("pLife").innerText = pLife;
  document.getElementById("eLife").innerText = eLife;
  document.getElementById("hand").innerHTML = bHand.map((c,i)=>cardHTML(c,i,'hand')).join("");
  document.getElementById("battleZone").innerHTML = bZone.map((c,i)=>cardHTML(c,i,'battle')).join("");
  document.getElementById("benchZone").innerHTML = bench.map(c=>cardHTML(c,0,'none')).join("");
  document.getElementById("enemyZone").innerHTML = eZone.map(c=>cardHTML(c,0,'none')).join("");

  if(pLife<=0) finishBattle("LOSE", "ライフが0になりました");
  else if(eLife<=0) finishBattle("WIN", "相手のライフを0にしました");
}

function finishBattle(res, msg){
  if(res==="WIN"){
    let rew = diff==="easy"?100:diff==="normal"?200:300;
    money+=rew; alert("勝利！\n" + msg + "\n報酬:" + rew);
  } else {
    alert("敗北...\n" + msg);
  }
  updateMoney();
  showScreen("battleSelect");
}

function openActionPanel(i){
  selectedCardIdx = i;
  document.getElementById("selectedCardName").innerText = bHand[i].name;
  document.getElementById("actionPanel").style.display = "block";
}
function cancelPlay(){ document.getElementById("actionPanel").style.display = "none"; }

function confirmPlay(target){
  let card = bHand.splice(selectedCardIdx, 1)[0];
  if(target==='battle'){
    if(bZone.length < 2) bZone.push(card);
    else { alert("バトルゾーン満杯"); bHand.unshift(card); }
  } else {
    if(bench.length < 3) bench.push(card);
    else { alert("待機ゾーン満杯"); bHand.unshift(card); }
  }
  cancelPlay();
  updateBattleUI();
}

function attack(i){
  if(hasAttacked) return alert("攻撃は1ターン1回です");
  let attacker = bZone[i];
  let damage = attacker.level * 300;
  
  if(eZone.length > 0){
    let target = eZone[0];
    target.hp -= damage;
    alert(attacker.name + "の攻撃！ " + damage + "ダメージ！");
    if(target.hp <= 0) { alert("相手のカードを撃破！"); eZone.shift(); if(eDeck.length>0) eZone.push(eDeck.pop()); }
  } else {
    eLife -= damage;
    alert("ダイレクトアタック！ " + damage + "ダメージ！");
  }

  if(eZone.length === 0 && eDeck.length === 0) return finishBattle("WIN", "相手を全滅させました");
  
  hasAttacked = true;
  updateBattleUI();
}

function passTurn(){
  alert("相手のターン...");
  while(eZone.length < (diff==="easy"?1:2) && eDeck.length > 0) eZone.push(eDeck.pop());

  if(eZone.length > 0){
    let dmg = eZone[0].level * 250;
    if(bZone.length > 0){
      bZone[0].hp -= dmg;
      alert("敵の攻撃！ " + bZone[0].name + "に" + dmg + "ダメージ！");
      if(bZone[0].hp <= 0) { alert(bZone[0].name + "は倒された..."); bZone.shift(); }
    } else {
      pLife -= dmg;
      alert("敵のダイレクトアタック！ " + dmg + "ダメージ！");
    }
  }

  // 全滅判定
  if(bZone.length === 0 && bench.length === 0) return finishBattle("LOSE", "自分の場が全滅しました！");

  alert("自分のターン！");
  if(bDeck.length > 0) bHand.push(bDeck.pop());
  while(bZone.length < 2 && bench.length > 0) bZone.push(bench.shift());
  
  hasAttacked = false;
  updateBattleUI();
}

// コイン補充機能
function getCoin(){
  money += 100;
  updateMoney();
  document.getElementById("coinAlert").innerText = "100コイン獲得しました！ (現在: 💰 " + money + ")";
}

updateMoney();
</script>
</body>
</html>
