<!DOCTYPE html>
<html>
<head>
  <title>カードゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;
      color: white;
      text-align: center;
    }

    /* 所持金 */
    #money {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 18px;
    }

    /* メニュー */
    #menu {
      position: fixed;
      top: 10px;
      right: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
    }

    .screen {
      display: none;
      padding-top: 60px;
    }

    .active {
      display: block;
    }

    .card {
      display: inline-block;
      width: 60px;
      height: 90px;
      border: 2px solid white;
      border-radius: 8px;
      margin: 5px;
      line-height: 90px;
      font-size: 20px;
      background: #333;
      cursor: pointer;
    }

    .selected {
      border: 2px solid yellow;
    }
  </style>
</head>
<body>

<div id="money">💰 900</div>

<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">ストック</button>
  <button onclick="showScreen('battle')">対戦</button>
  <button onclick="showScreen('coin')">コイン</button>
</div>

<!-- ガチャ -->
<div id="draw" class="screen active">
  <h2>カードを引く</h2>
  <button onclick="drawCard()">1回（100）</button>
  <button onclick="draw10()">10連（900）</button>
  <div id="drawResult"></div>
</div>

<!-- ストック -->
<div id="stock" class="screen">
  <h2>ストック</h2>
  <div id="stockList"></div>
</div>

<!-- 対戦 -->
<div id="battle" class="screen">
  <h2>対戦（5枚選択）</h2>
  <div id="selectCards"></div>
  <button onclick="startBattle()">決定</button>

  <h3>自分</h3>
  <div id="player"></div>

  <h3>BOT</h3>
  <div id="bot"></div>

  <h2 id="result"></h2>
</div>

<!-- コイン -->
<div id="coin" class="screen">
  <h2>コインを稼ぐ</h2>
  <p>（ここに後でミニゲームなど追加）</p>
  <button onclick="getCoin()">とりあえず100コインGET</button>
</div>

<script>
let stock = [];
let selected = [];
let money = 900;

// 表示更新
function updateMoney() {
  document.getElementById("money").innerText = "💰 " + money;
}

// 画面切り替え
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "stock") showStock();
  if (id === "battle") showSelect();
}

// ガチャ（1回）
function drawCard() {
  if (money < 100) return alert("コイン不足！");
  money -= 100;
  updateMoney();

  let num = Math.floor(Math.random() * 10) + 1;
  stock.push(num);

  document.getElementById("drawResult").innerHTML =
    `<div class="card">${num}</div>`;
}

// ガチャ（10連）
function draw10() {
  if (money < 900) return alert("コイン不足！");
  money -= 900;
  updateMoney();

  let result = "";
  for (let i = 0; i < 10; i++) {
    let num = Math.floor(Math.random() * 10) + 1;
    stock.push(num);
    result += `<div class="card">${num}</div>`;
  }

  document.getElementById("drawResult").innerHTML = result;
}

// ストック表示
function showStock() {
  document.getElementById("stockList").innerHTML =
    stock.map(n => `<div class="card">${n}</div>`).join("");
}

// 選択画面
function showSelect() {
  selected = [];

  document.getElementById("selectCards").innerHTML =
    stock.map((n, i) => 
      `<div class="card" onclick="selectCard(${i}, this)">${n}</div>`
    ).join("");
}

// カード選択
function selectCard(index, el) {
  if (selected.includes(index)) {
    selected = selected.filter(i => i !== index);
    el.classList.remove("selected");
  } else {
    if (selected.length >= 5) return;
    selected.push(index);
    el.classList.add("selected");
  }
}

// バトル
function startBattle() {
  if (selected.length !== 5) return alert("5枚選んで！");

  let player = selected.map(i => stock[i]);
  let bot = [];

  for (let i = 0; i < 5; i++) {
    bot.push(Math.floor(Math.random() * 10) + 1);
  }

  document.getElementById("player").innerHTML =
    player.map(n => `<div class="card">${n}</div>`).join("");

  document.getElementById("bot").innerHTML =
    bot.map(n => `<div class="card">${n}</div>`).join("");

  let pSum = player.reduce((a,b)=>a+b,0);
  let bSum = bot.reduce((a,b)=>a+b,0);

  let result = "";

  if (pSum > bSum) {
    result = "あなたの勝ち！ (+100コイン)";
    money += 100;
    updateMoney();
  }
  else if (pSum < bSum) result = "BOTの勝ち！";
  else result = "引き分け！";

  document.getElementById("result").innerHTML =
    `あなた ${pSum} - BOT ${bSum}<br>${result}`;
}

// コイン仮取得
function getCoin() {
  money += 100;
  updateMoney();
}
</script>

</body>
</html>
