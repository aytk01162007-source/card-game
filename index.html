<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カードゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;
      color: white;
      text-align: center;
    }
    
    #drawResult {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    #money {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 5px;
    }

    #menu {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 100;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .screen {
      display: none;
      padding-top: 60px;
      padding-bottom: 50px;
    }

    .active {
      display: block;
    }

    #stockList, #deckArea, #hand, #battleZone, #benchZone, #enemyZone {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
    }

    .card {
      width: 80px;
      height: 120px;
      border: 2px solid white;
      border-radius: 8px;
      margin: 5px;
      padding: 5px;
      background: #333;
      cursor: pointer;
      font-size: 11px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .rare {
      border-color: gold;
      box-shadow: 0 0 5px gold;
    }

    #deckArea {
      border: 2px dashed #555;
      padding: 10px;
      margin: 10px;
      min-height: 130px;
    }

    .battle-info {
      margin: 10px;
      padding: 10px;
      background: #444;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="money">💰 900</div>

<div id="menu">
  <button onclick="showScreen('draw')">ガチャ</button>
  <button onclick="showScreen('stock')">デッキ編成</button>
  <button onclick="showScreen('battleSelect')">対戦</button>
  <button onclick="showScreen('coin')">コイン</button>
</div>

<!-- ガチャ -->
<div id="draw" class="screen active">
  <h2>ガチャ</h2>
  <button onclick="drawCard()">1回（100）</button>
  <button onclick="draw10()">10連（900）</button>
  <div id="drawResult"></div>
</div>

<!-- ストック/デッキ編成 -->
<div id="stock" class="screen">
  <h2>デッキ（20枚必須） <span id="deckCount">0</span>/20</h2>
  <div id="deckArea"></div>

  <h2>ストック（タップで追加）</h2>
  <div id="stockList"></div>
</div>

<!-- レベルアップ画面 -->
<div id="upgrade" class="screen">
  <h2>カード強化</h2>
  <div id="upgradeCard"></div>
  <p>強化には100コイン必要です</p>
  <button onclick="levelUp()">レベルアップ（100）</button>
  <button onclick="showScreen('stock')">戻る</button>
</div>

<!-- BOT選択 -->
<div id="battleSelect" class="screen">
  <h2>対戦相手の難易度</h2>
  <p>※デッキが20枚必要です</p>
  <button onclick="startBattle('easy')">弱い（+100）</button>
  <button onclick="startBattle('normal')">普通（+200）</button>
  <button onclick="startBattle('hard')">強い（+300）</button>
</div>

<!-- 対戦 -->
<div id="battle" class="screen">
  <div class="battle-info">
    相手ライフ: <span id="eLife">5000</span><br>
    自分ライフ: <span id="pLife">5000</span>
  </div>

  <h3>相手バトルゾーン</h3>
  <div id="enemyZone"></div>

  <hr>

  <h3>自分の場（タップで攻撃）</h3>
  <div id="battleZone"></div>

  <h3>待機ゾーン</h3>
  <div id="benchZone"></div>

  <h3>手札（タップで場に出す）</h3>
  <div id="hand"></div>

  <div style="margin-top:20px;">
    <button onclick="passTurn()">ターン終了</button>
  </div>
  <h2 id="resultMsg"></h2>
</div>

<!-- コイン -->
<div id="coin" class="screen">
  <h2>コイン</h2>
  <button onclick="getCoin()">無料で100コインもらう</button>
</div>

<script>
let money = 900;
let stock = [];
let deck = [];
let currentCardIndex = null;

// 対戦用状態
let playerLife = 5000;
let enemyLife = 5000;
let battleHand = [];
let battleZone = [];
let benchZone = [];
let enemyZone = [];
let currentDeck = [];
let hasAttacked = false;
let currentDifficulty = "easy";

const characters = [
  "りうら","-hotoke-","初兎","ないこ","If","悠佑",
  "Coe.","Relu","如月ゆう","くに","こったろ","暇72",
  "雨乃こさめ","いるま","LAN","すち","みこと",
  "ARKHE","かなめ","うるみや","しの","甘夢れむ",
  "しゃるろ","天來らいむ","ひづみ","らみ",
  "初噛みつき","ユエル","リンドウネイロ"
];

function updateMoney(){
  document.getElementById("money").innerText="💰 " + money;
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="stock") showStock();
}

function createCard(){
  let name = characters[Math.floor(Math.random()*characters.length)];
  let isRare = Math.random() < 0.05;
  let level = 1;
  return {
    name: name,
    rarity: isRare ? "rare" : "normal",
    level: level,
    def: level * 500 // 初期防御力の設定
  };
}

function cardHTML(c, index, type) {
  let onClick = "";
  if(type === 'stock') onClick = `onclick="addToDeck(${index})"`;
  if(type === 'deck') onClick = `onclick="removeFromDeck(${index})" oncontextmenu="openUpgrade(${index});return false;"`;
  
  return `<div class="card ${c.rarity}" ${onClick}>
    <div><b>${c.name}</b></div>
    <div>Lv.${c.level}</div>
    <div>HP:${c.def}</div>
    <div style="font-size:9px">${c.rarity.toUpperCase()}</div>
  </div>`;
}

// ガチャ
function drawCard(){
  if(money < 100) return alert("コイン不足");
  money -= 100; updateMoney();
  let c = createCard();
  stock.push(c);
  document.getElementById("drawResult").innerHTML = cardHTML(c);
}

function draw10(){
  if(money < 900) return alert("コイン不足");
  money -= 900; updateMoney();
  let html = "";
  for(let i=0; i<10; i++){
    let c = createCard();
    stock.push(c);
    html += cardHTML(c);
  }
  document.getElementById("drawResult").innerHTML = html;
}

// デッキ管理
function showStock(){
  document.getElementById("deckCount").innerText = deck.length;
  document.getElementById("deckArea").innerHTML = deck.map((c,i)=> cardHTML(c, i, 'deck')).join("");
  document.getElementById("stockList").innerHTML = stock.map((c,i)=> cardHTML(c, i, 'stock')).join("");
}

function addToDeck(i){
  if(deck.length >= 20) return alert("デッキは20枚までです");
  deck.push(stock[i]);
  stock.splice(i, 1);
  showStock();
}

function removeFromDeck(i){
  stock.push(deck[i]);
  deck.splice(i, 1);
  showStock();
}

function openUpgrade(i){
  currentCardIndex = i;
  showScreen("upgrade");
  document.getElementById("upgradeCard").innerHTML = cardHTML(deck[i]);
}

function levelUp(){
  if(money < 100) return alert("コイン不足");
  let c = deck[currentCardIndex];
  if(c.level >= 99) return alert("最大レベルです");
  money -= 100;
  c.level++;
  c.def = c.level * 500;
  updateMoney();
  document.getElementById("upgradeCard").innerHTML = cardHTML(c);
}

// 対戦ロジック
function startBattle(diff){
  if(deck.length < 20) return alert("デッキを20枚にしてください（現在"+deck.length+"枚）");
  
  currentDifficulty = diff;
  playerLife = 5000;
  enemyLife = 5000;
  battleZone = [];
  benchZone = [];
  enemyZone = [];
  battleHand = [];
  currentDeck = JSON.parse(JSON.stringify(deck)); // デッキをコピー
  currentDeck.sort(() => Math.random() - 0.5); // シャッフル

  // 初期手札
  for(let i=0; i<5; i++) battleHand.push(currentDeck.pop());

  // 敵の初期配置
  let enemyCount = diff === "easy" ? 1 : diff === "normal" ? 2 : 3;
  for(let i=0; i<enemyCount; i++) {
    let ec = createCard();
    ec.level = diff === "easy" ? 1 : diff === "normal" ? 5 : 15;
    ec.def = ec.level * 500;
    enemyZone.push(ec);
  }

  showScreen("battle");
  updateBattleUI();
}

function updateBattleUI(){
  document.getElementById("pLife").innerText = playerLife;
  document.getElementById("eLife").innerText = enemyLife;
  document.getElementById("resultMsg").innerText = "";

  document.getElementById("hand").innerHTML = battleHand.map((c,i)=> `
    <div class="card" onclick="playToField(${i})">${c.name}<br>Lv.${c.level}<br>HP:${c.def}</div>
  `).join("");

  document.getElementById("battleZone").innerHTML = battleZone.map((c,i)=> `
    <div class="card" onclick="attack(${i})">${c.name}<br>Lv.${c.level}<br>HP:${c.def}</div>
  `).join("");

  document.getElementById("benchZone").innerHTML = benchZone.map(c=> `
    <div class="card">${c.name}<br>Lv.${c.level}</div>
  `).join("");

  document.getElementById("enemyZone").innerHTML = enemyZone.map(c=> `
    <div class="card">${c.name}<br>Lv.${c.level}<br>HP:${c.def}</div>
  `).join("");

  if(playerLife <= 0) finishBattle("LOSE");
  if(enemyLife <= 0) finishBattle("WIN");
}

function playToField(i){
  if(battleZone.length < 2) {
    battleZone.push(battleHand.splice(i, 1)[0]);
  } else if(benchZone.length < 3) {
    benchZone.push(battleHand.splice(i, 1)[0]);
  } else {
    alert("場がいっぱいです");
  }
  updateBattleUI();
}

function attack(i){
  if(hasAttacked) return alert("1ターンに攻撃は1回までです");
  if(enemyZone.length === 0) {
    enemyLife -= 1000;
  } else {
    let attacker = battleZone[i];
    let target = enemyZone[0];
    let damage = attacker.level * 300;
    target.def -= damage;
    if(target.def <= 0) enemyZone.shift();
  }
  hasAttacked = true;
  updateBattleUI();
}

function passTurn(){
  // 敵のターン
  if(enemyZone.length > 0 && battleZone.length > 0) {
    let damage = enemyZone[0].level * 300;
    battleZone[0].def -= damage;
    if(battleZone[0].def <= 0) battleZone.shift();
  } else if(enemyZone.length > 0) {
    playerLife -= 500;
  }

  // 補充
  if(currentDeck.length > 0) battleHand.push(currentDeck.pop());
  
  // 待機からバトルゾーンへ移動
  while(battleZone.length < 2 && benchZone.length > 0) {
    battleZone.push(benchZone.shift());
  }

  hasAttacked = false;
  updateBattleUI();
}

function finishBattle(res){
  if(res === "WIN") {
    let reward = currentDifficulty === "easy" ? 100 : currentDifficulty === "normal" ? 200 : 300;
    money += reward;
    alert("勝利！報酬：" + reward + "コイン");
  } else {
    alert("敗北...");
  }
  updateMoney();
  showScreen("battleSelect");
}

function getCoin(){
  money += 100;
  updateMoney();
  alert("100コイン獲得しました！");
}

// 初期化
updateMoney();
</script>

</body>
</html>
